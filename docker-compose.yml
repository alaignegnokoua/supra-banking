services:
  postgres:
    image: postgres:16-alpine
    container_name: supra-banking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: supra_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - supra_banking_pg_data:/var/lib/postgresql/data

volumes:
  supra_banking_pg_data:
