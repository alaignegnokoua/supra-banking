spring.datasource.url=jdbc:h2:mem:supra_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
app.transfers.max-daily-count=10
app.transfers.min-interval-seconds=120
app.transfers.risk-block-threshold=90
app.transfers.risk-block-threshold-internal=95
app.transfers.risk-block-threshold-external=90
app.transfers.risk-unusual-hour-start=0
app.transfers.risk-unusual-hour-end=23
app.transfers.risk-unusual-hour-score-external=0
app.transfers.risk-unusual-hour-score-internal=0
app.transfers.risk-multi-beneficiary-score-external=12
