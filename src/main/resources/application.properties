spring.application.name=supra-banking
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/supra_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

app.security.jwt.secret=${JWT_SECRET:c3VwcmEtYmFua2luZy1kZXZlbG9wbWVudC1zZWNyZXQtMjAyNi1zdXByYS1iYW5raW5nLWFwcA==}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.security.admin.username=${ADMIN_USERNAME:admin}
app.security.admin.email=${ADMIN_EMAIL:admin@supra-banking.local}
app.security.admin.password=${ADMIN_PASSWORD:Admin123!}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

app.notifications.email.enabled=${NOTIFICATION_EMAIL_ENABLED:false}
app.notifications.email.from=${NOTIFICATION_EMAIL_FROM:no-reply@supra-banking.local}
app.transfers.max-single-amount=${MAX_TRANSFER_SINGLE_AMOUNT:10000}
app.transfers.max-daily-total=${MAX_TRANSFER_DAILY_TOTAL:15000}
app.transfers.max-daily-count=${MAX_TRANSFER_DAILY_COUNT:10}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

